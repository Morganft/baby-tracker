services:
  app:
    build: .
    image: baby-tracker
    container_name: baby-tracker
    restart: unless-stopped
    ports:
      # Host:container. Reachable on your LAN / VPN only (no auth by design).
      - '3000:3000'
    volumes:
      # The whole dataset is one SQLite file under here — back this up.
      - baby-tracker-data:/data
    environment:
      DATABASE_URL: /data/app.db
      # This container runs behind Caddy (baby.home → this service). Derive the
      # public origin from the proxy's forwarded headers instead of pinning a
      # single ORIGIN, so CSRF checks and redirects use the real hostname/scheme
      # (adapter-node ignores headers whenever ORIGIN is set, so leave it unset).
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host

volumes:
  baby-tracker-data:
